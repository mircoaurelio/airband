<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Band - Virtual Guitar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <!-- Three.js for 3D AR Guitar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        html, body { width: 100%; height: 100%; }
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; touch-action: none; }
        .video-container {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background-color: #000;
        }
        /* CRITICAL FIX FOR iOS: pointer-events: none impedisce al tocco di attivare il player nativo */
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            display: block;
            margin: 0;
            padding: 0;
            border: none;
            pointer-events: none; 
        }
        video {
            object-fit: cover;
            opacity: 0;
        }
        canvas {
            object-fit: fill;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        /* Bottone Toggle */
        #toggle-mode-btn {
            pointer-events: auto; /* Consente al bottone di essere cliccato */
        }
        #shuffle-btn {
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="text-6xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">AIR BAND</h1>
        <p class="text-gray-400 mb-8 max-w-md text-center">
            Usa la tua webcam per suonare una chitarra invisibile. <br><br>
            <strong>Distanza mano sinistra-busto:</strong> Sceglie l'accordo.<br>
            <strong>Polso destro (pose):</strong> Attraversa la linea corde per strummare.<br>
            <strong>Direzione:</strong> Alto→basso = downstroke, basso→alto = upstroke inverso.
        </p>
        <div class="w-[min(520px,82vw)]">
            <div class="flex items-center justify-between mb-2 text-sm text-gray-300">
                <span id="init-status">Inizializzazione...</span>
                <span id="init-progress-value">0%</span>
            </div>
            <div class="h-3 w-full rounded-full bg-white/10 border border-white/15 overflow-hidden">
                <div id="init-progress-fill" class="h-full rounded-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-300 ease-out" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <div class="video-container">
        <!-- iOS Fix: webkit-playsinline e disablePictureInPicture per forzare il background mode -->
        <video id="webcam" autoplay playsinline webkit-playsinline muted disablePictureInPicture controlslist="nodownload nofullscreen noremoteplayback" x-webkit-airplay="deny" disableremoteplayback></video>
        <canvas id="bg-canvas"></canvas>
        <canvas id="three-canvas"></canvas>
        <canvas id="output-canvas"></canvas>
        
        <!-- Pulsante stile minimale in alto a destra -->
        <button id="toggle-mode-btn" class="absolute top-6 right-6 w-14 h-14 flex items-center justify-center bg-black/40 hover:bg-black/70 backdrop-blur-md rounded-full text-white text-3xl border border-white/20 transition-all hidden z-50 shadow-lg" title="Cambia Chitarra">
            🎸
        </button>
        <button id="shuffle-btn" class="absolute top-6 right-24 w-14 h-14 flex items-center justify-center bg-black/40 hover:bg-black/70 backdrop-blur-md rounded-full text-white text-3xl border border-white/20 transition-all hidden z-50 shadow-lg" title="Shuffle accordi selezionati">
            🔀
        </button>
    </div>

                ]

                    { name: "C",  notes: [65.41, 130.81, 164.81, 196.00, 261.63, 329.63] },
                    { name: "D",  notes: [73.42, 110.00, 146.83, 220.00, 293.66, 369.99] },
                    { name: "G",  notes: [98.00, 123.47, 146.83, 196.00, 246.94, 392.00] },
                    { name: "Em", notes: [82.41, 123.47, 164.81, 196.00, 246.94, 329.63] },
                    { name: "C",  notes: [65.41, 130.81, 164.81, 196.00, 261.63, 329.63] },
                    { name: "D",  notes: [73.42, 110.00, 146.83, 220.00, 293.66, 369.99] }
                ]
            }
        ];
        const BASS_CHORD_SETS = [
            {
                name: "Bass Pop 4",
                chords: [
                    { name: "Em", notes: [41.20, 61.74, 82.41, 123.47] },
                    { name: "C",  notes: [32.70, 49.00, 65.41, 98.00] },
                    { name: "G",  notes: [49.00, 73.42, 98.00, 146.83] },
                    { name: "D",  notes: [36.71, 55.00, 73.42, 110.00] }
                ]
            }
        ];
        let CHORD_SETS = GUITAR_CHORD_SETS;
        let CHORDS = CHORD_SETS[0].chords;

        let activeChordIndex = 0;
        let activeChordSetIndex = 0;
        let lastGuitarChordSetIndex = 0;
        const SHUFFLE_SELECTION_INDICES = [0, 2, 3, 5, 7, 9, 10, 11];
        const SHUFFLE_LOCK_MS = 1800;
        let shuffleLockUntil = 0;
        let lastHandSelectedIndex = 0;
        const KNEE_RAISE_THRESHOLD = 0.045;
        const KNEE_STEP_LOCK_MS = 1200;
        let prevRightKneeRaised = false;
        let prevLeftKneeRaised = false;
        const NOTE_COLORS = ['#ef4444', '#f59e0b', '#22c55e', '#06b6d4', '#3b82f6', '#a855f7'];
        let lastPluckedStringIndex = -1;

        function makeDistortionCurve(amount) {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) {
                const x = i * 2 / n_samples - 1;
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        }

        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            masterCompressor = audioCtx.createDynamicsCompressor();
            masterCompressor.threshold.value = -12;
            masterCompressor.knee.value = 30;
            masterCompressor.ratio.value = 12;
            masterCompressor.attack.value = 0.003;
            masterCompressor.release.value = 0.25;
            masterCompressor.connect(audioCtx.destination);
            
            distortionNode = audioCtx.createWaveShaper();
            distortionNode.curve = makeDistortionCurve(120); 
            distortionNode.oversample = '4x';
            
            rockCabHighpass = audioCtx.createBiquadFilter();
            rockCabHighpass.type = 'highpass';
            rockCabHighpass.frequency.value = 95;
            rockCabHighpass.Q.value = 0.8;

            rockCabLowpass = audioCtx.createBiquadFilter();
            rockCabLowpass.type = 'lowpass';
            rockCabLowpass.frequency.value = 3400;
            rockCabLowpass.Q.value = 0.85;

            rockPresenceEq = audioCtx.createBiquadFilter();
            rockPresenceEq.type = 'peaking';
            rockPresenceEq.frequency.value = 2200;
            rockPresenceEq.Q.value = 1.0;
            rockPresenceEq.gain.value = 3.2;

            distGain = audioCtx.createGain();
            distGain.gain.value = 0.26; 
            
            distortionNode.connect(rockCabHighpass);
            rockCabHighpass.connect(rockCabLowpass);
            rockCabLowpass.connect(rockPresenceEq);
            rockPresenceEq.connect(distGain);
            distGain.connect(masterCompressor);

            reverseDistortionNode = audioCtx.createWaveShaper();
            reverseDistortionNode.curve = makeDistortionCurve(260);
            reverseDistortionNode.oversample = '4x';

            reverseCabBandpass = audioCtx.createBiquadFilter();
            reverseCabBandpass.type = 'bandpass';
            reverseCabBandpass.frequency.value = 1700;
            reverseCabBandpass.Q.value = 0.9;

            reversePresenceEq = audioCtx.createBiquadFilter();
            reversePresenceEq.type = 'highshelf';
            reversePresenceEq.frequency.value = 2400;
            reversePresenceEq.gain.value = 5.5;

            reverseDistGain = audioCtx.createGain();
            reverseDistGain.gain.value = 0.21;

            reverseDistortionNode.connect(reverseCabBandpass);
            reverseCabBandpass.connect(reversePresenceEq);
            reversePresenceEq.connect(reverseDistGain);
            reverseDistGain.connect(masterCompressor);
        }

        function ensureAudioReady() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().catch(() => {});
            }
        }

        function playNote(freq) {
            if (!audioCtx) return;
            ensureAudioReady();
            
            if (isReverseVMode) {
                const now = audioCtx.currentTime;
                const oscMain = audioCtx.createOscillator();
                const oscOct = audioCtx.createOscillator();
                const oscSub = audioCtx.createOscillator();
                const mainGain = audioCtx.createGain();
                const octGain = audioCtx.createGain();
                const subGain = audioCtx.createGain();
                const preShapeGain = audioCtx.createGain();
                const toneGate = audioCtx.createBiquadFilter();
                const biteBand = audioCtx.createBiquadFilter();
                const outGain = audioCtx.createGain();

                oscMain.type = 'triangle';
                oscOct.type = 'sawtooth';
                oscSub.type = 'triangle';
                oscMain.frequency.setValueAtTime(freq, now);
                oscOct.frequency.setValueAtTime(freq * 2, now);
                oscSub.frequency.setValueAtTime(freq * 0.5, now);
                oscMain.detune.value = 5;
                oscOct.detune.value = -7;
                oscSub.detune.value = 2;
                oscMain.frequency.setValueAtTime(freq * 1.008, now);
                oscMain.frequency.exponentialRampToValueAtTime(freq, now + 0.022);

                mainGain.gain.value = 0.48;
                octGain.gain.value = 0.16;
                subGain.gain.value = 0.12;
                preShapeGain.gain.value = 1.52;

                toneGate.type = 'highpass';
                toneGate.frequency.setValueAtTime(150, now);
                toneGate.Q.value = 0.72;
                biteBand.type = 'peaking';
                biteBand.frequency.setValueAtTime(1800, now);
                biteBand.Q.value = 1.1;
                biteBand.gain.value = 2.8;

                oscMain.connect(mainGain);
                oscOct.connect(octGain);
                oscSub.connect(subGain);
                mainGain.connect(preShapeGain);
                octGain.connect(preShapeGain);
                subGain.connect(preShapeGain);
                preShapeGain.connect(toneGate);
                toneGate.connect(biteBand);
                biteBand.connect(outGain);
                outGain.connect(reverseDistortionNode);

                outGain.gain.setValueAtTime(0.0001, now);
                outGain.gain.linearRampToValueAtTime(0.82, now + 0.003);
                outGain.gain.exponentialRampToValueAtTime(0.26, now + 0.16);
                outGain.gain.exponentialRampToValueAtTime(0.035, now + 1.25);
                outGain.gain.exponentialRampToValueAtTime(0.0008, now + 2.45);

                const dryBlend = audioCtx.createGain();
                dryBlend.gain.value = 0.08;
                biteBand.connect(dryBlend);
                dryBlend.connect(masterCompressor);

                // Short metallic pick/noise burst keeps attack definition.
                const noiseBuffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.018), audioCtx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * (1 - (i / noiseData.length));
                }
                const noiseSource = audioCtx.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = 3300;
                noiseFilter.Q.value = 1.4;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.0001, now);
                noiseGain.gain.linearRampToValueAtTime(0.13, now + 0.0018);
                noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.02);
                noiseSource.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(reverseDistortionNode);

                oscMain.start(now);
                oscOct.start(now);
                oscSub.start(now);
                noiseSource.start(now);
                oscMain.stop(now + 2.5);
                oscOct.stop(now + 2.2);
                oscSub.stop(now + 2.6);
                noiseSource.stop(now + 0.023);

                oscMain.onended = () => {
                    try { dryBlend.disconnect(); } catch (e) {}
                    try { mainGain.disconnect(); } catch (e) {}
                    try { octGain.disconnect(); } catch (e) {}
                    try { subGain.disconnect(); } catch (e) {}
                    try { preShapeGain.disconnect(); } catch (e) {}
                    try { toneGate.disconnect(); } catch (e) {}
                    try { biteBand.disconnect(); } catch (e) {}
                    try { outGain.disconnect(); } catch (e) {}
                    try { noiseGain.disconnect(); } catch (e) {}
                    try { noiseFilter.disconnect(); } catch (e) {}
                };
            } else if (isRockMode) {
                const now = audioCtx.currentTime;
                const oscA = audioCtx.createOscillator();
                const oscB = audioCtx.createOscillator();
                const oscLow = audioCtx.createOscillator();
                const oscAGain = audioCtx.createGain();
                const oscBGain = audioCtx.createGain();
                const oscLowGain = audioCtx.createGain();
                const preAmp = audioCtx.createGain();
                const pickTone = audioCtx.createBiquadFilter();
                const bodyTone = audioCtx.createBiquadFilter();
                const pickAttackGain = audioCtx.createGain();

                oscA.type = 'sawtooth';
                oscB.type = 'square';
                oscLow.type = 'triangle';
                oscA.frequency.setValueAtTime(freq, now);
                oscB.frequency.setValueAtTime(freq, now);
                oscLow.frequency.setValueAtTime(freq * 0.5, now);
                oscA.detune.value = -3;
                oscB.detune.value = 4;
                oscLow.detune.value = 2;

                oscAGain.gain.value = 0.62;
                oscBGain.gain.value = 0.24;
                oscLowGain.gain.value = 0.14;
                preAmp.gain.value = 1.32;

                pickTone.type = 'lowpass';
                pickTone.Q.value = 0.9;
                pickTone.frequency.setValueAtTime(5200, now);
                pickTone.frequency.exponentialRampToValueAtTime(2500, now + 0.13);
                bodyTone.type = 'peaking';
                bodyTone.frequency.value = 420;
                bodyTone.Q.value = 0.9;
                bodyTone.gain.value = 2.0;

                oscA.connect(oscAGain);
                oscB.connect(oscBGain);
                oscLow.connect(oscLowGain);
                oscAGain.connect(preAmp);
                oscBGain.connect(preAmp);
                oscLowGain.connect(preAmp);
                preAmp.connect(pickTone);
                pickTone.connect(bodyTone);
                bodyTone.connect(pickAttackGain);
                pickAttackGain.connect(distortionNode);
                
                // Small dry blend keeps electric mode audible on all devices.
                const dryBlend = audioCtx.createGain();
                dryBlend.gain.value = 0.1;
                bodyTone.connect(dryBlend);
                dryBlend.connect(masterCompressor);

                // Sharp pick transient followed by controlled decay for electric feel.
                pickAttackGain.gain.setValueAtTime(0.0001, now);
                pickAttackGain.gain.linearRampToValueAtTime(0.93, now + 0.0038);
                pickAttackGain.gain.exponentialRampToValueAtTime(0.24, now + 0.15);
                pickAttackGain.gain.exponentialRampToValueAtTime(0.012, now + 1.18);

                // Add a very short noise click to emulate pick-on-string.
                const noiseBuffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.02), audioCtx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * (1 - (i / noiseData.length));
                }
                const noiseSource = audioCtx.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = 2600;
                noiseFilter.Q.value = 1.2;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.0001, now);
                noiseGain.gain.linearRampToValueAtTime(0.18, now + 0.002);
                noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);
                noiseSource.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(distortionNode);

                oscA.start(now);
                oscB.start(now);
                oscLow.start(now);
                noiseSource.start(now);

                oscA.stop(now + 1.22);
                oscB.stop(now + 1.02);
                oscLow.stop(now + 1.28);
                noiseSource.stop(now + 0.035);

                oscA.onended = () => {
                    try { dryBlend.disconnect(); } catch (e) {}
                    try { oscAGain.disconnect(); } catch (e) {}
                    try { oscBGain.disconnect(); } catch (e) {}
                    try { oscLowGain.disconnect(); } catch (e) {}
                    try { preAmp.disconnect(); } catch (e) {}
                    try { pickTone.disconnect(); } catch (e) {}
                    try { bodyTone.disconnect(); } catch (e) {}
                    try { pickAttackGain.disconnect(); } catch (e) {}
                    try { noiseGain.disconnect(); } catch (e) {}
                    try { noiseFilter.disconnect(); } catch (e) {}
                };
            } else if (isBassMode) {
                const now = audioCtx.currentTime;
                const bassBus = audioCtx.createGain();
                const bassHP = audioCtx.createBiquadFilter();
                const bassLP = audioCtx.createBiquadFilter();
                const bassBody = audioCtx.createBiquadFilter();
                const bassFinger = audioCtx.createBiquadFilter();
                const bassPunch = audioCtx.createBiquadFilter();
                const bassGain = audioCtx.createGain();

                bassHP.type = 'highpass';
                bassHP.frequency.value = 32;
                bassHP.Q.value = 0.8;
                bassLP.type = 'lowpass';
                bassLP.frequency.setValueAtTime(920, now);
                bassLP.frequency.exponentialRampToValueAtTime(560, now + 0.35);
                bassLP.Q.value = 0.85;
                bassBody.type = 'peaking';
                bassBody.frequency.value = 105;
                bassBody.Q.value = 1.1;
                bassBody.gain.value = 4.1;
                bassFinger.type = 'peaking';
                bassFinger.frequency.value = 720;
                bassFinger.Q.value = 1.05;
                bassFinger.gain.value = 2.2;
                bassPunch.type = 'peaking';
                bassPunch.frequency.value = 185;
                bassPunch.Q.value = 0.95;
                bassPunch.gain.value = 2.4;

                bassGain.connect(bassHP);
                bassHP.connect(bassLP);
                bassLP.connect(bassBody);
                bassBody.connect(bassPunch);
                bassPunch.connect(bassFinger);
                bassFinger.connect(masterCompressor);

                const bassFund = audioCtx.createOscillator();
                const bassHarm = audioCtx.createOscillator();
                const bassSub = audioCtx.createOscillator();
                bassFund.type = 'triangle';
                bassHarm.type = 'sawtooth';
                bassSub.type = 'sine';
                bassFund.frequency.setValueAtTime(freq, now);
                bassHarm.frequency.setValueAtTime(freq * 2, now);
                bassSub.frequency.setValueAtTime(freq * 0.5, now);
                bassHarm.detune.value = -3;

                const fundGain = audioCtx.createGain();
                const harmGain = audioCtx.createGain();
                const subGain = audioCtx.createGain();
                fundGain.gain.value = 0.68;
                harmGain.gain.value = 0.16;
                subGain.gain.value = 0.24;

                bassFund.connect(fundGain);
                bassHarm.connect(harmGain);
                bassSub.connect(subGain);
                fundGain.connect(bassBus);
                harmGain.connect(bassBus);
                subGain.connect(bassBus);
                bassBus.connect(bassGain);
                bassGain.gain.setValueAtTime(0.0001, now);
                bassGain.gain.linearRampToValueAtTime(0.74, now + 0.009);
                bassGain.gain.exponentialRampToValueAtTime(0.26, now + 0.23);
                bassGain.gain.exponentialRampToValueAtTime(0.001, now + 1.42);

                // Finger pluck transient for articulation on low notes.
                const noiseBuffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.04), audioCtx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * (1 - (i / noiseData.length));
                }
                const noiseSource = audioCtx.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = 1400;
                noiseFilter.Q.value = 0.9;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.0001, now);
                noiseGain.gain.linearRampToValueAtTime(0.07, now + 0.003);
                noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.055);
                noiseSource.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(bassBus);

                bassFund.start(now);
                bassHarm.start(now);
                bassSub.start(now);
                noiseSource.start(now);
                bassFund.stop(now + 1.45);
                bassHarm.stop(now + 1.0);
                bassSub.stop(now + 1.58);
                noiseSource.stop(now + 0.06);

                bassFund.onended = () => {
                    try { bassGain.disconnect(); } catch (e) {}
                    try { bassBus.disconnect(); } catch (e) {}
                    try { bassHP.disconnect(); } catch (e) {}
                    try { bassLP.disconnect(); } catch (e) {}
                    try { bassBody.disconnect(); } catch (e) {}
                    try { bassFinger.disconnect(); } catch (e) {}
                    try { bassPunch.disconnect(); } catch (e) {}
                    try { fundGain.disconnect(); } catch (e) {}
                    try { harmGain.disconnect(); } catch (e) {}
                    try { subGain.disconnect(); } catch (e) {}
                    try { noiseGain.disconnect(); } catch (e) {}
                    try { noiseFilter.disconnect(); } catch (e) {}
                };
            } else {
                const now = audioCtx.currentTime;
                const noteBus = audioCtx.createGain();
                const hp = audioCtx.createBiquadFilter();
                const bodyLow = audioCtx.createBiquadFilter();
                const bodyTop = audioCtx.createBiquadFilter();
                const lp = audioCtx.createBiquadFilter();
                const panner = audioCtx.createStereoPanner();
                const outputGain = audioCtx.createGain();

                hp.type = 'highpass';
                hp.frequency.value = 78;
                hp.Q.value = 0.7;

                // Two resonances emulate classical body "air" and top plate.
                bodyLow.type = 'peaking';
                bodyLow.frequency.value = Math.max(105, Math.min(210, freq * 0.95));
                bodyLow.Q.value = 1.15;
                bodyLow.gain.value = 3.4;

                bodyTop.type = 'peaking';
                bodyTop.frequency.value = Math.max(310, Math.min(760, freq * 2.05));
                bodyTop.Q.value = 1.2;
                bodyTop.gain.value = 2.6;

                lp.type = 'lowpass';
                lp.Q.value = 0.86;
                lp.frequency.setValueAtTime(Math.min(5600, 3400 + (freq * 1.6)), now);
                lp.frequency.exponentialRampToValueAtTime(Math.max(1500, 1050 + (freq * 1.7)), now + 0.65);

                panner.pan.value = (Math.random() * 0.24) - 0.12;

                noteBus.connect(hp);
                hp.connect(bodyLow);
                bodyLow.connect(bodyTop);
                bodyTop.connect(lp);
                lp.connect(panner);
                panner.connect(outputGain);
                outputGain.connect(masterCompressor);

                // Partial stack tuned for nylon-string timbre.
                const fundamental = audioCtx.createOscillator();
                const harmonic2 = audioCtx.createOscillator();
                const harmonic3 = audioCtx.createOscillator();
                const harmonic4 = audioCtx.createOscillator();
                const stringGain = audioCtx.createGain();
                const fundamentalGain = audioCtx.createGain();
                const harmonic2Gain = audioCtx.createGain();
                const harmonic3Gain = audioCtx.createGain();
                const harmonic4Gain = audioCtx.createGain();
                const detuneDrift = (Math.random() * 5.5) - 2.75;

                fundamental.type = 'triangle';
                harmonic2.type = 'sine';
                harmonic3.type = 'triangle';
                harmonic4.type = 'sine';

                fundamental.frequency.setValueAtTime(freq, now);
                harmonic2.frequency.setValueAtTime(freq * 2.002, now);
                harmonic3.frequency.setValueAtTime(freq * 3.015, now);
                harmonic4.frequency.setValueAtTime(freq * 4.035, now);

                harmonic2.detune.value = detuneDrift - 4;
                harmonic3.detune.value = detuneDrift + 7;
                harmonic4.detune.value = detuneDrift + 3;

                // Tiny pitch drop in first milliseconds gives a more natural pluck onset.
                fundamental.frequency.setValueAtTime(freq * 1.005, now);
                fundamental.frequency.exponentialRampToValueAtTime(freq, now + 0.018);

                fundamentalGain.gain.value = 0.88;
                harmonic2Gain.gain.value = 0.31;
                harmonic3Gain.gain.value = 0.18;
                harmonic4Gain.gain.value = 0.07;

                fundamental.connect(fundamentalGain);
                harmonic2.connect(harmonic2Gain);
                harmonic3.connect(harmonic3Gain);
                harmonic4.connect(harmonic4Gain);
                fundamentalGain.connect(stringGain);
                harmonic2Gain.connect(stringGain);
                harmonic3Gain.connect(stringGain);
                harmonic4Gain.connect(stringGain);
                stringGain.connect(noteBus);

                stringGain.gain.setValueAtTime(0.0001, now);
                stringGain.gain.linearRampToValueAtTime(0.37, now + 0.0055);
                stringGain.gain.exponentialRampToValueAtTime(0.13, now + 0.14);
                stringGain.gain.exponentialRampToValueAtTime(0.001, now + 2.55);

                // Finger/nail transient split in two bands for more realistic attack.
                const noiseBuffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.05), audioCtx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    const t = i / noiseData.length;
                    noiseData[i] = (Math.random() * 2 - 1) * ((1 - t) * (1 - t));
                }

                const fingerNoiseSource = audioCtx.createBufferSource();
                fingerNoiseSource.buffer = noiseBuffer;
                const fingerBand = audioCtx.createBiquadFilter();
                fingerBand.type = 'bandpass';
                fingerBand.frequency.value = 2100;
                fingerBand.Q.value = 0.9;
                const fingerGain = audioCtx.createGain();
                fingerGain.gain.setValueAtTime(0.0001, now);
                fingerGain.gain.linearRampToValueAtTime(0.16, now + 0.002);
                fingerGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.065);

                const nailNoiseSource = audioCtx.createBufferSource();
                nailNoiseSource.buffer = noiseBuffer;
                const nailBand = audioCtx.createBiquadFilter();
                nailBand.type = 'highpass';
                nailBand.frequency.value = 4200;
                nailBand.Q.value = 0.8;
                const nailGain = audioCtx.createGain();
                nailGain.gain.setValueAtTime(0.0001, now);
                nailGain.gain.linearRampToValueAtTime(0.085, now + 0.0015);
                nailGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.028);

                fingerNoiseSource.connect(fingerBand);
                fingerBand.connect(fingerGain);
                fingerGain.connect(noteBus);
                nailNoiseSource.connect(nailBand);
                nailBand.connect(nailGain);
                nailGain.connect(noteBus);

                outputGain.gain.setValueAtTime(1.0, now);
                outputGain.gain.exponentialRampToValueAtTime(0.965, now + 0.5);

                fundamental.start(now);
                harmonic2.start(now);
                harmonic3.start(now);
                harmonic4.start(now);
                fingerNoiseSource.start(now);
                nailNoiseSource.start(now);

                fundamental.stop(now + 2.6);
                harmonic2.stop(now + 2.05);
                harmonic3.stop(now + 1.75);
                harmonic4.stop(now + 1.2);
                fingerNoiseSource.stop(now + 0.07);
                nailNoiseSource.stop(now + 0.035);

                fundamental.onended = () => {
                    try { fundamentalGain.disconnect(); } catch (e) {}
                    try { harmonic2Gain.disconnect(); } catch (e) {}
                    try { harmonic3Gain.disconnect(); } catch (e) {}
                    try { harmonic4Gain.disconnect(); } catch (e) {}
                    try { stringGain.disconnect(); } catch (e) {}
                    try { noteBus.disconnect(); } catch (e) {}
                    try { hp.disconnect(); } catch (e) {}
                    try { bodyLow.disconnect(); } catch (e) {}
                    try { bodyTop.disconnect(); } catch (e) {}
                    try { lp.disconnect(); } catch (e) {}
                    try { panner.disconnect(); } catch (e) {}
                    try { outputGain.disconnect(); } catch (e) {}
                    try { fingerGain.disconnect(); } catch (e) {}
                    try { fingerBand.disconnect(); } catch (e) {}
                    try { nailGain.disconnect(); } catch (e) {}
                    try { nailBand.disconnect(); } catch (e) {}
                };
            }
        }

        function pointToSegmentMetrics(point, a, b) {
            const abx = b.x - a.x;
            const aby = b.y - a.y;
            const apx = point.x - a.x;
            const apy = point.y - a.y;
            const l2 = (abx * abx) + (aby * aby);

            if (l2 < 1e-6) {
                return { t: 0, dist: Math.hypot(apx, apy), side: 0 };
            }

            const rawT = ((apx * abx) + (apy * aby)) / l2;
            const t = Math.max(0, Math.min(1, rawT));
            const projX = a.x + (abx * t);
            const projY = a.y + (aby * t);
            const dist = Math.hypot(point.x - projX, point.y - projY);
            const side = (abx * apy) - (aby * apx);

            return { t: rawT, dist, side };
        }

        function shuffleChordFromSelection() {
            let pool = SHUFFLE_SELECTION_INDICES.filter((idx) => idx >= 0 && idx < CHORDS.length);
            if (CHORDS.length <= 4) {
                pool = Array.from({ length: CHORDS.length }, (_, i) => i);
            }
            if (!pool.length) return;

            let nextIndex = pool[Math.floor(Math.random() * pool.length)];
            if (pool.length > 1 && nextIndex === activeChordIndex) {
                nextIndex = pool[Math.floor(Math.random() * pool.length)];
            }

            activeChordIndex = nextIndex;
            shuffleLockUntil = Date.now() + SHUFFLE_LOCK_MS;

        function getLayoutMetrics() {
            const dstW = Math.max(1, canvasElement.width || videoContainer.clientWidth || window.innerWidth);
            const dstH = Math.max(1, canvasElement.height || videoContainer.clientHeight || window.innerHeight);
            const srcW = Math.max(1, videoElement.videoWidth || dstW);
            const srcH = Math.max(1, videoElement.videoHeight || dstH);
            const scale = Math.max(dstW / srcW, dstH / srcH);
            const sourceCropW = dstW / scale;
            const sourceCropH = dstH / scale;
            const sourceCropX = (srcW - sourceCropW) / 2;
            const sourceCropY = (srcH - sourceCropH) / 2;
            return { srcW, srcH, dstW, dstH, scale, sourceCropX, sourceCropY, sourceCropW, sourceCropH };
        }

        function projectVideoPoint(normX, normY) {
            const m = getLayoutMetrics();
            const x = ((normX * m.srcW) - m.sourceCropX) * (m.dstW / m.sourceCropW);
            const y = ((normY * m.srcH) - m.sourceCropY) * (m.dstH / m.sourceCropH);
            return {
                x,
                y,
                nx: x / m.dstW,
                ny: y / m.dstH
            };
        }

        function applyVintageGuitarShader(root, tintHex = 0xe5d4bf) {
            const tint = new THREE.Color(tintHex);
            const markMaterial = (material) => {
                if (!material || material.userData?.vintageShaderApplied) return;
                if (!(material.isMeshStandardMaterial || material.isMeshPhysicalMaterial)) return;

                material.roughness = Math.min(1, (material.roughness ?? 0.6) + 0.2);
                material.metalness = Math.max(0, (material.metalness ?? 0.2) - 0.12);

                material.onBeforeCompile = (shader) => {
                    shader.uniforms.uTime = { value: 0 };
                    shader.uniforms.uTint = { value: tint };
                    shader.uniforms.uGrainStrength = { value: 0.04 };

                    shader.fragmentShader = shader.fragmentShader
                        .replace(
                            '#include <common>',
                            `#include <common>
uniform float uTime;
uniform vec3 uTint;
uniform float uGrainStrength;
float hash21(vec2 p) {
    p = fract(p * vec2(123.34, 345.45));
    p += dot(p, p + 34.345);
    return fract(p.x * p.y);
}`
                        )
                        .replace(
                            '#include <dithering_fragment>',
                            `float grain = (hash21(gl_FragCoord.xy + uTime * 45.0) - 0.5) * uGrainStrength;
float lum = dot(gl_FragColor.rgb, vec3(0.2126, 0.7152, 0.0722));
vec3 graded = mix(vec3(lum), gl_FragColor.rgb, 0.78);
graded = mix(graded, graded * uTint, 0.16);
float rim = pow(1.0 - abs(dot(normalize(vNormal), normalize(vViewPosition))), 2.0);
graded += rim * 0.08;
gl_FragColor.rgb = clamp(graded + grain, 0.0, 1.0);
#include <dithering_fragment>`
                        );

                    guitarShaderTimeUniforms.push(shader.uniforms.uTime);
                };

                material.userData = material.userData || {};
                material.userData.vintageShaderApplied = true;
                material.needsUpdate = true;
            };

            root.traverse((node) => {
                if (!node.isMesh || !node.material) return;
                if (Array.isArray(node.material)) {
                    node.material.forEach(markMaterial);
                } else {
                    markMaterial(node.material);
                }
            });
        }

        function animateThreeJS() {
            requestAnimationFrame(animateThreeJS);
            const now = performance.now() * 0.001;
            for (const uTime of guitarShaderTimeUniforms) {
                uTime.value = now;
            }
            
            if (guitarGroup && guitarGroup.visible) {
                const currentBridge = bodyAnchor.x !== null ? bodyAnchor : { x: 0.5, y: 0.6, z: 0 };
                const currentBridgeProjected = projectVideoPoint(currentBridge.x, currentBridge.y);
                const bridge3D = mapTo3D(currentBridgeProjected.nx, currentBridgeProjected.ny, currentBridge.z);
                
                guitarGroup.scale.set(bodyScale, bodyScale, bodyScale);
                guitarGroup.position.set(bridge3D.x, bridge3D.y, bridge3D.z);
                
                guitarGroup.rotation.z = lastNeckAngleZ; 
                guitarGroup.rotation.y = lastNeckAngleY;
                
                const FIXED_NECK_LENGTH = BASE_NECK_LENGTH;
                if (acousticNeckAnchor) {
                    const stretch = Math.max(0.6, Math.min(1.7, desiredNeckLength / FIXED_NECK_LENGTH));
                    acousticNeckAnchor.scale.x = stretch;
                }
                if (rockNeckAnchor) {
                    const stretch = Math.max(0.6, Math.min(1.7, desiredNeckLength / FIXED_NECK_LENGTH));
                    rockNeckAnchor.scale.x = stretch;
                }
                if (reverseVNeckAnchor) {
                    const stretch = Math.max(0.6, Math.min(1.7, desiredNeckLength / FIXED_NECK_LENGTH));
                    reverseVNeckAnchor.scale.x = stretch;
                }
                if (bassNeckAnchor) {
                    const stretch = Math.max(0.6, Math.min(1.7, desiredNeckLength / FIXED_NECK_LENGTH));
                    bassNeckAnchor.scale.x = stretch;
                }
            }

            renderer.render(scene, camera);
        }

        function mapTo3D(normX, normY, normZ = 0) {
            const ndcX = normX * 2 - 1;
            const ndcY = -(normY * 2 - 1); 
            
            const vFov = camera.fov * Math.PI / 180;
            const height = 2 * Math.tan(vFov / 2) * camera.position.z;
            const width = height * camera.aspect;

            return {
                x: (ndcX * width) / 2,
                y: (ndcY * height) / 2,
                z: normZ * width * 1.5 
            };
        }

        function updateChordText(chordName) {
            if (chordName === lastChordName) return;
            lastChordName = chordName;
            
            chordCtx.clearRect(0, 0, 256, 128);
            chordCtx.save();
            // Pre-flip text so it appears readable after global mirrored rendering.
            chordCtx.translate(256, 0);
            chordCtx.scale(-1, 1);
            chordCtx.fillStyle = '#ffffff';
            chordCtx.font = 'bold 80px sans-serif';
            chordCtx.textAlign = 'center';
            chordCtx.textBaseline = 'middle';
            
            chordCtx.shadowColor = isBassMode ? '#3b82f6' : (isReverseVMode ? '#d946ef' : (isRockMode ? '#cc0000' : '#000000'));
            chordCtx.shadowBlur = 10;
            chordCtx.fillText(chordName, 128, 64);
            chordCtx.restore();
            
            chordTexture.needsUpdate = true;
        }

        function onResults(results) {
            syncCanvases(); 
            if (videoElement.readyState >= 2) {
                drawVideoBackground();
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            const currentBridge = bodyAnchor.x !== null ? bodyAnchor : { x: 0.5, y: 0.6, z: 0 };

            if (results.multiHandLandmarks && results.multiHandLandmarks.length >= 1) {
                let fretHandMarks;
                let strumHandMarks = null;
                if (results.multiHandLandmarks.length >= 2) {
                    if (results.multiHandLandmarks[0][9].x < results.multiHandLandmarks[1][9].x) {
                        fretHandMarks = results.multiHandLandmarks[1];
                        strumHandMarks = results.multiHandLandmarks[0];
                    } else {
                        fretHandMarks = results.multiHandLandmarks[0];
                        strumHandMarks = results.multiHandLandmarks[1];
                    }
                } else {
                    fretHandMarks = results.multiHandLandmarks[0];
                }

                const fretHand = fretHandMarks[9];

                const projectedBridge = projectVideoPoint(currentBridge.x, currentBridge.y);
                const projectedFret = projectVideoPoint(fretHand.x, fretHand.y);
                const pBridge = { x: projectedBridge.x, y: projectedBridge.y };
                const pFret = { x: projectedFret.x, y: projectedFret.y };

                const dx = projectedFret.nx - projectedBridge.nx;
                const dy = projectedFret.ny - projectedBridge.ny;
                const distance = Math.sqrt(dx * dx + dy * dy);

                const minDist = CHORD_SELECT_MIN_DIST;
                const maxDist = CHORD_SELECT_MAX_DIST;
                let normalizedDist = (distance - minDist) / (maxDist - minDist);
                normalizedDist = Math.max(0, Math.min(1, normalizedDist)); 

                // Map chord zones along the handle in the opposite direction.
                // This places low chords on the long side and high chords on the short side.
                const curvedSelect = Math.pow(normalizedDist, CHORD_SELECT_CURVE);
                const handSelectedIndex = Math.max(0, Math.min(CHORDS.length - 1, Math.round(curvedSelect * (CHORDS.length - 1))));
                lastHandSelectedIndex = handSelectedIndex;
                if (Date.now() >= shuffleLockUntil) {
                    activeChordIndex = handSelectedIndex;
                }
                const currentChord = CHORDS[activeChordIndex];
                const stringCount = currentChord.notes.length;
                ensureStringTrackingSize(stringCount);
                
                updateChordText(currentChord.name);

                let pluckedThisFrame = false;
                const minDim = Math.min(canvasElement.width, canvasElement.height);
                const lineVec = { x: pFret.x - pBridge.x, y: pFret.y - pBridge.y };
                const lineLen = Math.max(1e-6, Math.hypot(lineVec.x, lineVec.y));
                const lineDir = { x: lineVec.x / lineLen, y: lineVec.y / lineLen };
                let lineNormal = { x: -lineDir.y, y: lineDir.x };
                if (lineNormal.y < 0) {
                    lineNormal = { x: -lineNormal.x, y: -lineNormal.y };
                }
                const stringYOffset = minDim * 0.028;
                const stringLeftOffset = minDim * 0.014;
                const strumStart = {
                    x: pBridge.x + (lineDir.x * lineLen * 0.08) + (lineNormal.x * stringYOffset) - stringLeftOffset,
                    y: pBridge.y + (lineDir.y * lineLen * 0.08) + (lineNormal.y * stringYOffset)
                };
                const strumEnd = {
                    x: pFret.x - (lineDir.x * lineLen * 0.06) + (lineNormal.x * stringYOffset) - stringLeftOffset,
                    y: pFret.y - (lineDir.y * lineLen * 0.06) + (lineNormal.y * stringYOffset)
                };
                const spacingFactor = isBassMode ? BASS_TRACK_SPACING_FACTOR : STRING_TRACK_SPACING_FACTOR;
                const stringSpacing = minDim * spacingFactor;
                const centerIdx = (stringCount - 1) / 2;
                const stringLines = new Array(stringCount).fill(null).map((_, idx) => {
                    const offset = (idx - centerIdx) * stringSpacing;
                    return {
                        start: {
                            x: strumStart.x + (lineNormal.x * offset),
                            y: strumStart.y + (lineNormal.y * offset)
                        },
                        end: {
                            x: strumEnd.x + (lineNormal.x * offset),
                            y: strumEnd.y + (lineNormal.y * offset)
                        }
                    };
                });

                if (SHOW_STRUM_GUIDE_LINE) {
                    canvasCtx.lineWidth = 2;
                    for (let i = 0; i < stringLines.length; i++) {
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(stringLines[i].start.x, stringLines[i].start.y);
                        canvasCtx.lineTo(stringLines[i].end.x, stringLines[i].end.y);
                        canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                        canvasCtx.stroke();
                    }
                }

                const poseStrumWrist = latestPoseLandmarks ? latestPoseLandmarks[16] : null;
                const poseStrumIndex = latestPoseLandmarks ? latestPoseLandmarks[20] : null;
                const poseStrumPinky = latestPoseLandmarks ? latestPoseLandmarks[18] : null;
                const poseStrumVisible = !!poseStrumWrist && (poseStrumWrist.visibility == null || poseStrumWrist.visibility > STRUM_POSE_VISIBILITY_THRESHOLD);
                const handStrumWrist = strumHandMarks ? strumHandMarks[0] : null;
                const handStrumIndex = strumHandMarks ? strumHandMarks[8] : null;
                const handStrumPinky = strumHandMarks ? strumHandMarks[20] : null;
                const handStrumVisible = !!handStrumWrist;
                const usePoseStrum = poseStrumVisible || !handStrumVisible;

                if (usePoseStrum ? poseStrumVisible : handStrumVisible) {
                    const baseWrist = usePoseStrum ? poseStrumWrist : handStrumWrist;
                    const baseIndex = usePoseStrum ? poseStrumIndex : handStrumIndex;
                    const basePinky = usePoseStrum ? poseStrumPinky : handStrumPinky;
                    const anchorX = (
                        (baseWrist.x * 0.55) +
                        ((baseIndex ? baseIndex.x : baseWrist.x) * 0.25) +
                        ((basePinky ? basePinky.x : baseWrist.x) * 0.2)
                    );
                    const anchorY = (
                        (baseWrist.y * 0.55) +
                        ((baseIndex ? baseIndex.y : baseWrist.y) * 0.25) +
                        ((basePinky ? basePinky.y : baseWrist.y) * 0.2)
                    );
                    const projectedWrist = projectVideoPoint(anchorX, anchorY);
                    // Positive factor means "visual left"; mirrored rendering needs opposite screen-space sign.
                    const screenXOffset = minDim * STRUM_POINT_LEFT_FACTOR * (IS_RENDER_MIRRORED ? 1 : -1);
                    const pStrum = {
                        x: projectedWrist.x + screenXOffset,
                        y: projectedWrist.y + (minDim * STRUM_POINT_DOWN_FACTOR)
                    };
                    const now = Date.now();
                    const leftHandDebounceMs = STRING_NOTE_DEBOUNCE_MS / LEFT_HAND_NOTE_RATE_MULTIPLIER;
                    const activeNoteDebounceMs = handStrumVisible ? leftHandDebounceMs : STRING_NOTE_DEBOUNCE_MS;
                    let activeStringCount = 0;
                    const sideDeadzone = minDim * STRING_SIDE_DEADZONE_FACTOR;
                    for (let i = 0; i < stringLines.length; i++) {
                        const metrics = pointToSegmentMetrics(pStrum, stringLines[i].start, stringLines[i].end);
                        const inPlayableSpan = metrics.t > STRUM_PLAYABLE_T_MIN && metrics.t < STRUM_PLAYABLE_T_MAX;
                        if (!inPlayableSpan) {
                            prevStringSides[i] = null;
                            continue;
                        }
                        const signedDist = metrics.side / lineLen;
                        let currentSide = 0;
                        if (signedDist > sideDeadzone) currentSide = 1;
                        else if (signedDist < -sideDeadzone) currentSide = -1;
                        if (currentSide === 0) continue;

                        activeStringCount++;
                        const prevSide = prevStringSides[i];
                        const crossedLine = prevSide !== null && currentSide !== prevSide;
                        if (crossedLine && (now - lastStringHitTimes[i] > activeNoteDebounceMs)) {
                            playNote(currentChord.notes[i]);
                            lastStringHitTimes[i] = now;
                            lastPluckedStringIndex = i;
                            pluckedThisFrame = true;
                        }
                        prevStringSides[i] = currentSide;
                    }

                    // Show the strum dot only when hand is on playable string lanes.
                    // Keep the last played note color; do not auto-return to yellow.
                    if (activeStringCount > 0) {
                        const noteColor = (lastPluckedStringIndex >= 0)
                            ? NOTE_COLORS[lastPluckedStringIndex % NOTE_COLORS.length]
                            : '#ffd43b';
                        canvasCtx.beginPath();
                        canvasCtx.arc(pStrum.x, pStrum.y, 10, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = noteColor;
                        canvasCtx.fill();
                        canvasCtx.lineWidth = 2;
                        canvasCtx.strokeStyle = '#ffffff';
                        canvasCtx.stroke();
                    }
                } else {
                    prevStringSides.fill(null);
                }

                if (pluckedThisFrame) {
                    isStrummingVisual = true;
                    clearTimeout(strumVisualTimer);
                    strumVisualTimer = setTimeout(() => { isStrummingVisual = false; }, 150);
                }

                const bridge3D = mapTo3D(projectedBridge.nx, projectedBridge.ny, currentBridge.z);
                const fret3D = mapTo3D(projectedFret.nx, projectedFret.ny, fretHand.z || 0);

                const dx3D = fret3D.x - bridge3D.x;
                const dy3D = fret3D.y - bridge3D.y;
                const dz3D = fret3D.z - bridge3D.z;

                const dist3D = Math.hypot(dx3D, dy3D);
                const localDist = dist3D / Math.max(0.1, bodyScale);
                if (localDist > NECK_ROTATION_DEADZONE_LOCAL) {
                    const targetAngleZ = Math.atan2(dy3D, dx3D);
                    const targetAngleY = Math.atan2(-dz3D, Math.hypot(dx3D, dy3D));
                    lastNeckAngleZ = (lastNeckAngleZ * (1 - NECK_ANGLE_LERP)) + (targetAngleZ * NECK_ANGLE_LERP);
                    lastNeckAngleY = (lastNeckAngleY * (1 - NECK_ANGLE_LERP)) + (targetAngleY * NECK_ANGLE_LERP);
                }

                const neckAnchorOffset = Math.max(0.6, acousticNeckAnchor ? acousticNeckAnchor.position.x : 0.6);
                const targetNeckLength = (localDist - neckAnchorOffset) + 2.55;
                const clampedTargetLength = Math.max(MIN_DESIRED_NECK_LENGTH, Math.min(targetNeckLength, MAX_DESIRED_NECK_LENGTH));
                desiredNeckLength = (desiredNeckLength * (1 - NECK_LENGTH_LERP)) + (clampedTargetLength * NECK_LENGTH_LERP);

            } else {
                prevStringSides.fill(null);
            }

            // Visual cue when knee gesture changes chord set:
            // expanding halo ring around upper torso, then dissipates.
            if (kneeHaloStartMs > 0 && bodyAnchor.x !== null) {
                const elapsed = Date.now() - kneeHaloStartMs;
                const t = Math.max(0, Math.min(1, elapsed / KNEE_HALO_DURATION_MS));
                if (t < 1) {
                    const m = getLayoutMetrics();
                    const center = projectVideoPoint(bodyAnchor.x, bodyAnchor.y);
                    const minDim = Math.min(canvasElement.width, canvasElement.height);
                    const radius = minDim * (KNEE_HALO_MIN_RADIUS_FACTOR + ((KNEE_HALO_MAX_RADIUS_FACTOR - KNEE_HALO_MIN_RADIUS_FACTOR) * t));
                    const alpha = 0.95 * (1 - t);
                    const hue = kneeHaloDirection > 0 ? '74, 222, 128' : '96, 165, 250';

                    canvasCtx.beginPath();
                    canvasCtx.arc(center.x, center.y, radius, 0, 2 * Math.PI);
                    canvasCtx.lineWidth = Math.max(4, minDim * 0.01);
                    canvasCtx.strokeStyle = `rgba(${hue}, ${alpha})`;
                    canvasCtx.stroke();

                    canvasCtx.beginPath();
                    canvasCtx.arc(center.x, center.y, radius * 0.68, 0, 2 * Math.PI);
                    canvasCtx.lineWidth = Math.max(2, minDim * 0.006);
                    canvasCtx.strokeStyle = `rgba(${hue}, ${alpha * 0.85})`;
                    canvasCtx.stroke();

                    // Direction cue near halo center.
                    canvasCtx.font = `bold ${Math.max(24, minDim * 0.048)}px sans-serif`;
                    canvasCtx.textAlign = 'center';
                    canvasCtx.textBaseline = 'middle';
                    canvasCtx.fillStyle = `rgba(${hue}, ${Math.max(0.45, alpha)})`;
                    canvasCtx.fillText(kneeHaloDirection > 0 ? 'NEXT' : 'PREV', center.x, center.y - (radius * 0.15));
                }
            }

            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});
        
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            syncCanvases(); 
            latestPoseLandmarks = results.poseLandmarks || null;
            if (results.poseLandmarks) {
                if (guitarGroup) guitarGroup.visible = true;
                clearTimeout(bodyLostTimer);
                bodyLostTimer = null;

                const lShoulder = results.poseLandmarks[11];
                const rShoulder = results.poseLandmarks[12];
                const lHipUpper = results.poseLandmarks[23];
                const rHipUpper = results.poseLandmarks[24];

                // Anchor on upper torso (closer to chest/shoulders).
                const shoulderMidX = (lShoulder.x + rShoulder.x) / 2;
                const shoulderMidY = (lShoulder.y + rShoulder.y) / 2;
                const shoulderMidZ = (lShoulder.z + rShoulder.z) / 2;
                const hipsVisible = lHipUpper && rHipUpper &&
                    (lHipUpper.visibility == null || lHipUpper.visibility > 0.3) &&
                    (rHipUpper.visibility == null || rHipUpper.visibility > 0.3);
                const hipMidY = hipsVisible ? ((lHipUpper.y + rHipUpper.y) / 2) : shoulderMidY;

                const midX = shoulderMidX;
                const midY = (shoulderMidY * 0.86) + (hipMidY * 0.14);
                const midZ = shoulderMidZ;

                // CORREZIONE SCALA PER DISPOSITIVI MOBILI IN VERTICALE
                const aspect = (canvasElement.width / canvasElement.height) || 1;
                const shoulderDx = (lShoulder.x - rShoulder.x) * aspect; 
                const shoulderDy = lShoulder.y - rShoulder.y;
                const shoulderDist = Math.hypot(shoulderDx, shoulderDy);
                
                // Scale follows shoulder span (distance from camera) with balanced caps.
                let targetScale = shoulderDist * SHOULDER_SCALE_MULT; 
                targetScale = Math.max(MIN_GUITAR_SCALE, Math.min(targetScale, MAX_GUITAR_SCALE));
                
                // Slightly higher placement than before.
                const targetY = (midY + (GUITAR_Y_OFFSET_FACTOR * targetScale)) - GUITAR_Y_LIFT; 

                if (bodyAnchor.x === null) {
                    bodyAnchor.x = midX;
                    bodyAnchor.y = targetY;
                    bodyAnchor.z = midZ;
                    bodyScale = targetScale;
                } else {
                    bodyAnchor.x = bodyAnchor.x * (1 - ANCHOR_LERP) + midX * ANCHOR_LERP;
                    bodyAnchor.y = bodyAnchor.y * (1 - ANCHOR_LERP) + targetY * ANCHOR_LERP;
                    bodyAnchor.z = (bodyAnchor.z || 0) * (1 - ANCHOR_LERP) + midZ * ANCHOR_LERP;
                    bodyScale = bodyScale * (1 - SCALE_LERP) + targetScale * SCALE_LERP;
                }

                // Knee gestures switch famous pop chord sets:
                // right knee up -> next set, left knee up -> previous set.
                const lHip = results.poseLandmarks[23];
                const rHip = results.poseLandmarks[24];
                const lKnee = results.poseLandmarks[25];
                const rKnee = results.poseLandmarks[26];
                const leftVisible = lHip && lKnee && (lKnee.visibility == null || lKnee.visibility > 0.35);
                const rightVisible = rHip && rKnee && (rKnee.visibility == null || rKnee.visibility > 0.35);
                const leftRaised = !!leftVisible && (lKnee.y < (lHip.y - KNEE_RAISE_THRESHOLD));
                const rightRaised = !!rightVisible && (rKnee.y < (rHip.y - KNEE_RAISE_THRESHOLD));

                const rightRisingEdge = rightRaised && !prevRightKneeRaised;
                const leftRisingEdge = leftRaised && !prevLeftKneeRaised;
                if (rightRisingEdge && !leftRisingEdge) {
                    stepChordSequence(1);
                    triggerKneeHalo(1);
                } else if (leftRisingEdge && !rightRisingEdge) {
                    stepChordSequence(-1);
                    triggerKneeHalo(-1);
                }

                prevRightKneeRaised = rightRaised;
                prevLeftKneeRaised = leftRaised;

            } else {
                latestPoseLandmarks = null;
                prevRightKneeRaised = false;
                prevLeftKneeRaised = false;
                if (!bodyLostTimer) {
                    bodyLostTimer = setTimeout(() => {
                        if (guitarGroup) guitarGroup.visible = false; 
                    }, 1500);
                }
            }
        });

        function updateInitProgress(percent, message) {
            const clamped = Math.max(0, Math.min(100, Math.round(percent)));
            if (initProgressFillEl) initProgressFillEl.style.width = `${clamped}%`;
            if (initProgressValueEl) initProgressValueEl.textContent = `${clamped}%`;
            if (message && initStatusEl) initStatusEl.textContent = message;
        }

        async function bootstrapApp() {
            try {
                updateInitProgress(6, 'Preparazione ambiente...');
                syncCanvases();

                updateInitProgress(22, 'Avvio audio...');
                initAudio();

                updateInitProgress(46, 'Caricamento scena 3D...');
                initThreeJS();
                applyInstrumentMode('acoustic');

                updateInitProgress(68, 'Connessione webcam...');
                hardenInlineVideo(videoElement);
                const webcamCamera = new Camera(videoElement, {
                    width: Math.max(640, window.innerWidth),
                    height: Math.max(480, window.innerHeight),
                    onFrame: async () => {
                        await pose.send({image: videoElement});
                        await hands.send({image: videoElement});
                    }
                });
                await webcamCamera.start();

                updateInitProgress(90, 'Quasi pronto...');
                try { await videoElement.play(); } catch (e) {}
                syncCanvases();

                updateInitProgress(100, 'Pronto!');
                document.getElementById('toggle-mode-btn').classList.remove('hidden');
                document.getElementById('shuffle-btn').classList.remove('hidden');
                setTimeout(() => {
                    startScreen.style.display = 'none';
                }, 240);
            } catch (err) {
                console.error('Init failed:', err);
                updateInitProgress(100, 'Errore avvio: consenti webcam e ricarica la pagina.');
                if (initStatusEl) initStatusEl.classList.add('text-red-300');
                if (initProgressFillEl) initProgressFillEl.classList.remove('from-blue-500', 'to-purple-500');
                if (initProgressFillEl) initProgressFillEl.classList.add('bg-red-500');
            }
        }

        bootstrapApp();

        window.addEventListener('resize', syncCanvases);

        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        toggleModeBtn.addEventListener('click', () => {
            let nextMode = 'acoustic';
            if (!isRockMode && !isBassMode && !isReverseVMode) nextMode = 'rock';
            else if (isRockMode) nextMode = 'reversev';
            else if (isReverseVMode) nextMode = 'bass';
            else nextMode = 'acoustic';

            applyInstrumentMode(nextMode);
            if (isReverseVMode) toggleModeBtn.innerText = "💜";
            else if (isBassMode) toggleModeBtn.innerText = "🎵";
            else if (isRockMode) toggleModeBtn.innerText = "⚡";
            else toggleModeBtn.innerText = "🎸";
        });

        const shuffleBtn = document.getElementById('shuffle-btn');
        shuffleBtn.addEventListener('click', () => {
            shuffleChordFromSelection();
        });

    </script>
</body>
</html>
