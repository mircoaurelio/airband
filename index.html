<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Band - Virtual Guitar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MediaPipe Libraries (Rimosso camera_utils perché usiamo un loop personalizzato anti-freeze) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <!-- Three.js for 3D AR Guitar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; touch-action: none; }
        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            overflow: hidden;
            background-color: #000;
        }

        /* FIX iOS: regole video separate per evitare fullscreen/player nativo. */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transform: scaleX(-1);
            display: block;
            margin: 0;
            padding: 0;
            border: none;
            z-index: 1;
            pointer-events: none; /* FIX iOS: Rende il video "intoccabile", bloccando l'apertura del player nativo */
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            object-fit: cover; 
            transform: scaleX(-1);
            display: block;
            margin: 0;
            padding: 0;
            border: none;
            pointer-events: none; 
            z-index: 2;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        #toggle-mode-btn {
            pointer-events: auto; 
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="text-6xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">AIR BAND</h1>
        <p class="text-gray-400 mb-8 max-w-md text-center">
            Usa la tua webcam per suonare una chitarra invisibile. <br><br>
            <strong>Distanza tra le mani:</strong> Sceglie l'accordo.<br>
            <strong>Dita della mano destra:</strong> Tocca le corde (la zona tra il busto e la mano sinistra) con i polpastrelli!
        </p>
        <button id="start-btn" class="px-8 py-4 bg-purple-600 hover:bg-purple-500 text-white rounded-full font-bold text-xl transition shadow-lg shadow-purple-500/50">
            Inizia a Suonare
        </button>
    </div>

    <div class="video-container">
        <!-- iOS Fix: Aggiunto webkit-playsinline per compatibilità massima con tutti gli iPhone/iPad -->
        <video id="webcam" autoplay playsinline webkit-playsinline muted></video>
        <canvas id="three-canvas"></canvas>
        <canvas id="output-canvas"></canvas>
        
        <button id="toggle-mode-btn" class="absolute top-6 right-6 w-14 h-14 flex items-center justify-center bg-black/40 hover:bg-black/70 backdrop-blur-md rounded-full text-white text-3xl border border-white/20 transition-all hidden z-50 shadow-lg" title="Cambia Chitarra">
            🎸
        </button>
    </div>

    <script>
        // --- Web Audio API Setup ---
        let audioCtx;
        let distortionNode;
        let distGain;
        let masterCompressor;
        let isRockMode = false;
        
        const CHORDS = [
            { name: "C",  notes: [130.81, 164.81, 196.00, 261.63, 329.63] },
            { name: "Dm", notes: [146.83, 174.61, 220.00, 293.66, 349.23] },
            { name: "Em", notes: [164.81, 196.00, 246.94, 329.63, 392.00] },
            { name: "F",  notes: [174.61, 220.00, 261.63, 349.23, 440.00] },
            { name: "G",  notes: [196.00, 246.94, 293.66, 392.00, 493.88] },
            { name: "Am", notes: [220.00, 261.63, 329.63, 440.00, 523.25] } 
        ];

        let activeChordIndex = 0;

        function makeDistortionCurve(amount) {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) {
                const x = i * 2 / n_samples - 1;
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        }

        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            masterCompressor = audioCtx.createDynamicsCompressor();
            masterCompressor.threshold.value = -12;
            masterCompressor.knee.value = 30;
            masterCompressor.ratio.value = 12;
            masterCompressor.attack.value = 0.003;
            masterCompressor.release.value = 0.25;
            masterCompressor.connect(audioCtx.destination);
            
            distortionNode = audioCtx.createWaveShaper();
            distortionNode.curve = makeDistortionCurve(150); 
            distortionNode.oversample = '4x';
            
            const cabFilter = audioCtx.createBiquadFilter();
            cabFilter.type = 'lowpass';
            cabFilter.frequency.value = 3500;

            distGain = audioCtx.createGain();
            distGain.gain.value = 0.05; 
            
            distortionNode.connect(cabFilter);
            cabFilter.connect(distGain);
            distGain.connect(masterCompressor);
        }

        function playNote(freq) {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            if (isRockMode) {
                osc.type = 'sawtooth';
                osc.connect(gainNode);
                gainNode.connect(distortionNode);
                
                osc.frequency.value = freq;
                osc.start();
                gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
                osc.stop(audioCtx.currentTime + 1.0);
            } else {
                osc.type = 'triangle';
                osc.connect(gainNode);
                gainNode.connect(masterCompressor); 
                
                osc.frequency.value = freq;
                osc.start();
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
                osc.stop(audioCtx.currentTime + 1.5);
            }
        }

        // --- MediaPipe & Logic Setup ---
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');

        let isStrummingVisual = false;
        let strumVisualTimer = null;

        // --- 3D AR Variables (Three.js) ---
        let scene, camera, renderer;
        let guitarGroup, occluderGroup;
        let occluders = []; 
        let fallbackGuitar, rockGuitar; 
        let acousticNeckAnchor, rockNeckAnchor; 
        let chordSprite, chordCtx, chordTexture; 
        let lastChordName = "";

        // Mechanics variables
        let bodyAnchor = { x: null, y: null, z: null }; 
        let bodyScale = 1.0; 
        let fingerStates = [false, false, false, false, false]; 
        let fingerLastPluckTime = [0, 0, 0, 0, 0]; 

        let lastNeckAngleZ = -0.5;
        let lastNeckAngleY = 0;
        let desiredNeckLength = 3.5;
        let bodyLostTimer = null; 

        function syncCanvases() {
            const vw = videoElement.videoWidth;
            const vh = videoElement.videoHeight;
            if (vw > 0 && vh > 0 && (canvasElement.width !== vw || canvasElement.height !== vh)) {
                canvasElement.width = vw;
                canvasElement.height = vh;
                
                const threeCanvas = document.getElementById('three-canvas');
                if (threeCanvas) {
                    threeCanvas.width = vw;
                    threeCanvas.height = vh;
                }
                if (camera && renderer) {
                    camera.aspect = vw / vh;
                    camera.updateProjectionMatrix();
                    renderer.setSize(vw, vh, false); 
                }
            }
        }

        function initThreeJS() {
            const threeCanvas = document.getElementById('three-canvas');
            threeCanvas.width = 1280;
            threeCanvas.height = 720;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, 1280 / 720, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
            renderer.setSize(1280, 720, false);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(0, 5, 10);
            scene.add(dirLight);

            // Testo Accordo 3D
            const chordCanvas = document.createElement('canvas');
            chordCanvas.width = 256;
            chordCanvas.height = 128;
            chordCtx = chordCanvas.getContext('2d');
            chordTexture = new THREE.CanvasTexture(chordCanvas);
            const spriteMat = new THREE.SpriteMaterial({ map: chordTexture, transparent: true, depthTest: false });
            chordSprite = new THREE.Sprite(spriteMat);
            chordSprite.position.set(-0.3, 1.0, 0.6); 
            chordSprite.scale.set(1.5, 0.75, 1);
            chordSprite.renderOrder = 999;

            occluderGroup = new THREE.Group();
            occluderGroup.renderOrder = -1; 
            scene.add(occluderGroup);
            
            const occMat = new THREE.MeshBasicMaterial({ colorWrite: false, depthWrite: true });
            const occGeo = new THREE.SphereGeometry(1, 12, 12);
            for(let i=0; i<60; i++) {
                let mesh = new THREE.Mesh(occGeo, occMat);
                mesh.visible = false;
                occluderGroup.add(mesh);
                occluders.push(mesh);
            }

            guitarGroup = new THREE.Group();
            guitarGroup.visible = false; 
            scene.add(guitarGroup);

            const FIXED_NECK_LENGTH = 3.5;

            // --- 2. Fallback Acoustic Procedural Guitar ---
            fallbackGuitar = new THREE.Group();
            
            const bodyGeom = new THREE.CylinderGeometry(1.6, 1.6, 0.4, 32);
            bodyGeom.rotateX(Math.PI / 2);
            bodyGeom.scale(1.2, 0.85, 1); 
            const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0x8b4513, roughness: 0.3, metalness: 0.1 });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.set(-0.8, 0, 0); 
            fallbackGuitar.add(body);

            const holeGeom = new THREE.CylinderGeometry(0.45, 0.45, 0.42, 16);
            holeGeom.rotateX(Math.PI / 2);
            const holeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const hole = new THREE.Mesh(holeGeom, holeMat);
            hole.position.set(-0.2, 0, 0);
            fallbackGuitar.add(hole);

            const pgGeom = new THREE.CylinderGeometry(0.75, 0.75, 0.41, 24, 1, false, 0, Math.PI);
            pgGeom.rotateX(Math.PI / 2);
            pgGeom.scale(0.8, 1, 1);
            const pgMat = new THREE.MeshPhysicalMaterial({ color: 0x220500 });
            const pickguard = new THREE.Mesh(pgGeom, pgMat);
            pickguard.position.set(0.1, -0.6, 0.01);
            pickguard.rotation.z = -0.4;
            fallbackGuitar.add(pickguard);

            const aBridgeGeom = new THREE.BoxGeometry(0.2, 0.8, 0.15);
            const aBridgeMat = new THREE.MeshStandardMaterial({ color: 0x3d1c00 });
            const acousticBridge = new THREE.Mesh(aBridgeGeom, aBridgeMat);
            acousticBridge.position.set(-0.9, 0, 0.22);
            fallbackGuitar.add(acousticBridge);

            acousticNeckAnchor = new THREE.Group();
            acousticNeckAnchor.position.set(0.6, 0, 0); 
            
            const neckGeom = new THREE.BoxGeometry(FIXED_NECK_LENGTH, 0.3, 0.15);
            neckGeom.translate(FIXED_NECK_LENGTH / 2, 0, 0); 
            const neckMat = new THREE.MeshStandardMaterial({ color: 0xdeb887 });
            const neck = new THREE.Mesh(neckGeom, neckMat);
            acousticNeckAnchor.add(neck);

            const fretGeom = new THREE.BoxGeometry(FIXED_NECK_LENGTH, 0.32, 0.05);
            fretGeom.translate(FIXED_NECK_LENGTH / 2, 0, 0.08); 
            const fretMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const fretboard = new THREE.Mesh(fretGeom, fretMat);
            acousticNeckAnchor.add(fretboard);

            const metalFretMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
            for(let i=1; i<=14; i++) {
                const fret = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.33, 0.02), metalFretMat);
                fret.position.set(i * (FIXED_NECK_LENGTH / 15), 0, 0.11);
                acousticNeckAnchor.add(fret);
            }

            const headstock = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.4, 0.15),
                new THREE.MeshStandardMaterial({ color: 0x8b4513 })
            );
            headstock.geometry.translate(0.4, 0, 0); 
            headstock.position.set(FIXED_NECK_LENGTH, 0, 0); 
            
            const pegMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8 });
            for(let i=0; i<3; i++) {
                const peg1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.2), pegMat);
                peg1.position.set(FIXED_NECK_LENGTH + 0.2 + i*0.2, 0.2, 0.05);
                acousticNeckAnchor.add(peg1);
                const peg2 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.2), pegMat);
                peg2.position.set(FIXED_NECK_LENGTH + 0.2 + i*0.2, -0.2, 0.05);
                acousticNeckAnchor.add(peg2);
            }
            acousticNeckAnchor.add(headstock);

            const stringMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee });
            for(let i=0; i<5; i++) {
                const stringGeom = new THREE.BoxGeometry(FIXED_NECK_LENGTH, 0.01, 0.01);
                stringGeom.translate(FIXED_NECK_LENGTH / 2, 0, 0.12);
                const stringMesh = new THREE.Mesh(stringGeom, stringMat);
                stringMesh.position.y = (i - 2) * 0.05;
                acousticNeckAnchor.add(stringMesh);
            }
            fallbackGuitar.add(acousticNeckAnchor);

            for(let i=0; i<5; i++) {
                const bStrGeom = new THREE.BoxGeometry(1.5, 0.01, 0.01);
                bStrGeom.translate(0.75, 0, 0);
                const bStrMesh = new THREE.Mesh(bStrGeom, stringMat);
                bStrMesh.position.set(-0.9, (i - 2) * 0.05, 0.28);
                fallbackGuitar.add(bStrMesh);
            }
            guitarGroup.add(fallbackGuitar);

            // --- 3. Rock V-Shape Procedural Guitar ---
            rockGuitar = new THREE.Group();
            
            const wingGeom = new THREE.BoxGeometry(3.5, 0.5, 0.9);
            const wingMat = new THREE.MeshPhysicalMaterial({ color: 0xcc0000, roughness: 0.2, metalness: 0.8 }); 
            
            const wing1 = new THREE.Mesh(wingGeom, wingMat);
            wing1.position.set(-1.4, 0.8, 0);
            wing1.rotation.z = 0.45; 
            
            const wing2 = new THREE.Mesh(wingGeom, wingMat);
            wing2.position.set(-1.4, -0.8, 0);
            wing2.rotation.z = -0.45;

            const centerBlock = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.0, 0.9), wingMat);
            centerBlock.position.set(-0.4, 0, 0);

            const pickupMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const pickup1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.7, 0.1), pickupMat);
            pickup1.position.set(-0.1, 0, 0.46);
            const pickup2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.7, 0.1), pickupMat);
            pickup2.position.set(-0.5, 0, 0.46);
            
            const rockBridge = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.15), metalFretMat);
            rockBridge.position.set(-0.9, 0, 0.46);

            const knobMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5 });
            const knob1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.1), knobMat);
            knob1.position.set(-0.4, -0.7, 0.45);
            knob1.rotation.x = Math.PI/2;
            const knob2 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.1), knobMat);
            knob2.position.set(-0.7, -0.8, 0.45);
            knob2.rotation.x = Math.PI/2;

            rockGuitar.add(wing1);
            rockGuitar.add(wing2);
            rockGuitar.add(centerBlock);
            rockGuitar.add(pickup1);
            rockGuitar.add(pickup2);
            rockGuitar.add(rockBridge);
            rockGuitar.add(knob1);
            rockGuitar.add(knob2);

            rockNeckAnchor = new THREE.Group();
            rockNeckAnchor.position.set(0.2, 0, 0); 
            
            const rockNeck = new THREE.Mesh(
                new THREE.BoxGeometry(FIXED_NECK_LENGTH, 0.25, 0.15).translate(FIXED_NECK_LENGTH / 2, 0, 0),
                new THREE.MeshStandardMaterial({ color: 0x111111 }) 
            );
            rockNeckAnchor.add(rockNeck);
            
            const rockFretboard = new THREE.Mesh(
                new THREE.BoxGeometry(FIXED_NECK_LENGTH, 0.28, 0.05).translate(FIXED_NECK_LENGTH / 2, 0, 0.08),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            rockNeckAnchor.add(rockFretboard);

            for(let i=1; i<=14; i++) {
                const fret = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.29, 0.02), metalFretMat);
                fret.position.set(i * (FIXED_NECK_LENGTH / 15), 0, 0.11);
                rockNeckAnchor.add(fret);
            }

            const headstockGeom = new THREE.CylinderGeometry(0.01, 0.3, 0.8, 3);
            headstockGeom.rotateZ(-Math.PI / 2);
            headstockGeom.translate(0.4, 0, 0);
            const headstockMesh = new THREE.Mesh(headstockGeom, wingMat);
            headstockMesh.position.set(FIXED_NECK_LENGTH, 0, 0);
            
            for(let i=0; i<5; i++) {
                const peg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.15), pegMat);
                peg.position.set(FIXED_NECK_LENGTH + 0.2 + i*0.12, 0.15, 0.05);
                rockNeckAnchor.add(peg);
                
                const stringMesh = new THREE.Mesh(
                    new THREE.BoxGeometry(FIXED_NECK_LENGTH, 0.01, 0.01).translate(FIXED_NECK_LENGTH / 2, 0, 0.12), 
                    stringMat
                );
                stringMesh.position.y = (i - 2) * 0.05;
                rockNeckAnchor.add(stringMesh);
                
                const bStrMesh = new THREE.Mesh(
                    new THREE.BoxGeometry(1.1, 0.01, 0.01).translate(0.55, 0, 0), 
                    stringMat
                );
                bStrMesh.position.set(-0.9, (i - 2) * 0.05, 0.54);
                rockGuitar.add(bStrMesh);
            }
            rockNeckAnchor.add(headstockMesh);

            rockGuitar.add(rockNeckAnchor);
            rockGuitar.visible = false; 
            guitarGroup.add(rockGuitar);

            guitarGroup.add(chordSprite);

            animateThreeJS();
        }

        function animateThreeJS() {
            requestAnimationFrame(animateThreeJS);
            
            if (guitarGroup && guitarGroup.visible) {
                const currentBridge = bodyAnchor.x !== null ? bodyAnchor : { x: 0.5, y: 0.6, z: 0 };
                const bridge3D = mapTo3D(currentBridge.x, currentBridge.y, currentBridge.z);
                
                guitarGroup.scale.set(bodyScale, bodyScale, bodyScale);
                guitarGroup.position.set(bridge3D.x, bridge3D.y, bridge3D.z);
                
                guitarGroup.rotation.z = lastNeckAngleZ; 
                guitarGroup.rotation.y = lastNeckAngleY;
                
                const FIXED_NECK_LENGTH = 3.5;
                if (acousticNeckAnchor) {
                    const stretch = Math.max(0.6, Math.min(1.7, desiredNeckLength / FIXED_NECK_LENGTH));
                    acousticNeckAnchor.scale.x = stretch;
                }
                if (rockNeckAnchor) {
                    const stretch = Math.max(0.6, Math.min(1.7, desiredNeckLength / FIXED_NECK_LENGTH));
                    rockNeckAnchor.scale.x = stretch;
                }
            }

            renderer.render(scene, camera);
        }

        function mapTo3D(normX, normY, normZ = 0) {
            const ndcX = normX * 2 - 1;
            const ndcY = -(normY * 2 - 1); 
            
            const vFov = camera.fov * Math.PI / 180;
            const height = 2 * Math.tan(vFov / 2) * camera.position.z;
            const width = height * camera.aspect;

            return {
                x: (ndcX * width) / 2,
                y: (ndcY * height) / 2,
                z: normZ * width * 1.5 
            };
        }

        function updateChordText(chordName) {
            if (chordName === lastChordName) return;
            lastChordName = chordName;
            
            chordCtx.clearRect(0, 0, 256, 128);
            chordCtx.fillStyle = '#ffffff';
            chordCtx.font = 'bold 80px sans-serif';
            chordCtx.textAlign = 'center';
            chordCtx.textBaseline = 'middle';
            
            chordCtx.shadowColor = isRockMode ? '#cc0000' : '#000000';
            chordCtx.shadowBlur = 10;
            chordCtx.fillText(chordName, 128, 64);
            
            chordTexture.needsUpdate = true;
        }

        function updateOccluders(landmarks, startIdx, count, scaleMult, offsetX = 0) {
            if(!landmarks) return;
            for(let i=0; i<count; i++) {
                if(startIdx + i >= occluders.length) break;
                const pt = landmarks[i];
                const p3D = mapTo3D(pt.x + offsetX, pt.y, (pt.z || 0) - 0.1); 
                occluders[startIdx + i].position.set(p3D.x, p3D.y, p3D.z);
                occluders[startIdx + i].scale.setScalar(bodyScale * scaleMult);
                occluders[startIdx + i].visible = true;
            }
        }

        function onResults(results) {
            syncCanvases(); 
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            const currentBridge = bodyAnchor.x !== null ? bodyAnchor : { x: 0.5, y: 0.6, z: 0 };

            if (results.multiHandLandmarks && results.multiHandLandmarks.length >= 2) {
                let fretHandMarks, strumHandMarks;
                if (results.multiHandLandmarks[0][9].x < results.multiHandLandmarks[1][9].x) {
                    fretHandMarks = results.multiHandLandmarks[1]; 
                    strumHandMarks = results.multiHandLandmarks[0]; 
                } else {
                    fretHandMarks = results.multiHandLandmarks[0];
                    strumHandMarks = results.multiHandLandmarks[1];
                }

                updateOccluders(fretHandMarks, 0, 21, 0.25);
                updateOccluders(strumHandMarks, 21, 21, 0.25);

                let strumHand = strumHandMarks[9];
                let fretHand = fretHandMarks[9];

                const pBridge = { x: currentBridge.x * canvasElement.width, y: currentBridge.y * canvasElement.height };
                const pFret = { x: fretHand.x * canvasElement.width, y: fretHand.y * canvasElement.height };

                const dx = fretHand.x - currentBridge.x;
                const dy = fretHand.y - currentBridge.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                const minDist = 0.1;
                const maxDist = 0.6;
                let normalizedDist = (distance - minDist) / (maxDist - minDist);
                normalizedDist = Math.max(0, Math.min(1, normalizedDist)); 

                activeChordIndex = Math.floor(normalizedDist * (CHORDS.length - 0.01)); 
                const currentChord = CHORDS[activeChordIndex];
                
                updateChordText(currentChord.name);

                const fingers = [{ tip: 4 }, { tip: 8 }, { tip: 12 }, { tip: 16 }, { tip: 20 }];

                let pluckedThisFrame = false;
                const L2 = Math.pow(pFret.x - pBridge.x, 2) + Math.pow(pFret.y - pBridge.y, 2);

                fingers.forEach((finger, idx) => {
                    const tip = strumHandMarks[finger.tip];
                    const pTip = { x: tip.x * canvasElement.width, y: tip.y * canvasElement.height };
                    
                    let dist = 0;
                    if (L2 === 0) {
                        dist = Math.hypot(pTip.x - pBridge.x, pTip.y - pBridge.y);
                    } else {
                        const t = Math.max(0, Math.min(1, ((pTip.x - pBridge.x) * (pFret.x - pBridge.x) + (pTip.y - pBridge.y) * (pFret.y - pBridge.y)) / L2));
                        const projX = pBridge.x + t * (pFret.x - pBridge.x);
                        const projY = pBridge.y + t * (pFret.y - pBridge.y);
                        dist = Math.hypot(pTip.x - projX, pTip.y - projY);
                    }

                    const minDim = Math.min(canvasElement.width, canvasElement.height);
                    const TOUCH_THRESHOLD = minDim * 0.04;
                    const RELEASE_THRESHOLD = minDim * 0.07;
                    
                    let isTouching = fingerStates[idx];
                    
                    if (!isTouching && dist < TOUCH_THRESHOLD) {
                        isTouching = true; 
                    } else if (isTouching && dist > RELEASE_THRESHOLD) {
                        isTouching = false; 
                    }

                    if (isTouching && !fingerStates[idx]) {
                        const now = Date.now();
                        if (now - fingerLastPluckTime[idx] > 100) { 
                            playNote(currentChord.notes[4 - idx]);
                            fingerLastPluckTime[idx] = now;
                            pluckedThisFrame = true;
                        }
                    }
                    fingerStates[idx] = isTouching;
                });

                if (pluckedThisFrame) {
                    isStrummingVisual = true;
                    clearTimeout(strumVisualTimer);
                    strumVisualTimer = setTimeout(() => { isStrummingVisual = false; }, 150);
                }

                const bridge3D = mapTo3D(currentBridge.x, currentBridge.y, currentBridge.z);
                const fret3D = mapTo3D(fretHand.x, fretHand.y, fretHand.z || 0);

                const dx3D = fret3D.x - bridge3D.x;
                const dy3D = fret3D.y - bridge3D.y;
                const dz3D = fret3D.z - bridge3D.z;

                lastNeckAngleZ = Math.atan2(dy3D, dx3D); 
                lastNeckAngleY = Math.atan2(-dz3D, Math.hypot(dx3D, dy3D)); 
                
                const dist3D = Math.hypot(dx3D, dy3D);
                const localDist = dist3D / Math.max(0.1, bodyScale);
                desiredNeckLength = (localDist - (acousticNeckAnchor ? acousticNeckAnchor.position.x : 0.6)) + 2.0;

                const drawPoint = (point, color, radius = 12) => {
                    canvasCtx.beginPath();
                    canvasCtx.arc(point.x, point.y, radius, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = color;
                    canvasCtx.fill();
                    canvasCtx.lineWidth = 3;
                    canvasCtx.strokeStyle = 'white';
                    canvasCtx.stroke();
                };

                drawPoint(pBridge, '#6b7280', 8); 
                drawPoint(pFret, '#3b82f6');      
                
                fingers.forEach((finger, idx) => {
                    const tip = strumHandMarks[finger.tip];
                    const pTip = { x: tip.x * canvasElement.width, y: tip.y * canvasElement.height };
                    const color = fingerStates[idx] ? '#10b981' : '#ec4899'; 
                    drawPoint(pTip, color, 8);
                });

            } else {
                fingerStates = [false, false, false, false, false]; 
                for(let i=0; i<42; i++) {
                    if(occluders[i]) occluders[i].visible = false;
                }
            }

            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});
        
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            syncCanvases(); 
            if (results.poseLandmarks) {
                if (guitarGroup) guitarGroup.visible = true;
                clearTimeout(bodyLostTimer);
                bodyLostTimer = null;

                const lShoulder = results.poseLandmarks[11];
                const rShoulder = results.poseLandmarks[12];
                
                const midX = (lShoulder.x * 0.15) + (rShoulder.x * 0.85);
                const midY = (lShoulder.y + rShoulder.y) / 2;
                const midZ = (lShoulder.z + rShoulder.z) / 2;

                const aspect = (canvasElement.width / canvasElement.height) || 1;
                const shoulderDx = (lShoulder.x - rShoulder.x) * aspect; 
                const shoulderDy = lShoulder.y - rShoulder.y;
                const shoulderDist = Math.hypot(shoulderDx, shoulderDy);
                
                let targetScale = shoulderDist * 2.5; 
                targetScale = Math.max(0.6, Math.min(targetScale, 2.0));
                
                const targetY = midY + (0.45 * targetScale); 

                if (bodyAnchor.x === null) {
                    bodyAnchor.x = midX;
                    bodyAnchor.y = targetY;
                    bodyAnchor.z = midZ;
                    bodyScale = targetScale;
                } else {
                    bodyAnchor.x = bodyAnchor.x * 0.8 + midX * 0.2;
                    bodyAnchor.y = bodyAnchor.y * 0.8 + targetY * 0.2;
                    bodyAnchor.z = (bodyAnchor.z || 0) * 0.8 + midZ * 0.2;
                    bodyScale = bodyScale * 0.9 + targetScale * 0.1;
                }

                const interpolateArm = (startIdx, elbow, wrist) => {
                    if(!elbow || !wrist) return;
                    let steps = 9;
                    for(let i=0; i<steps; i++) {
                        let t = i / (steps-1);
                        let pt = {
                            x: elbow.x * (1-t) + wrist.x * t,
                            y: elbow.y * (1-t) + wrist.y * t,
                            z: elbow.z * (1-t) + wrist.z * t
                        };
                        const p3D = mapTo3D(pt.x, pt.y, (pt.z || 0) - 0.1);
                        if(occluders[startIdx + i]) {
                            occluders[startIdx + i].position.set(p3D.x, p3D.y, p3D.z);
                            occluders[startIdx + i].scale.setScalar(bodyScale * 0.45); 
                            occluders[startIdx + i].visible = true;
                        }
                    }
                };
                
                interpolateArm(42, results.poseLandmarks[13], results.poseLandmarks[15]); 
                interpolateArm(51, results.poseLandmarks[14], results.poseLandmarks[16]); 

            } else {
                if (!bodyLostTimer) {
                    bodyLostTimer = setTimeout(() => {
                        if (guitarGroup) guitarGroup.visible = false; 
                    }, 1500);
                }
            }
        });
        // FIX iOS: Utilizzo di raw getUserMedia e loop manuale invece di funzioni forzate
        startBtn.addEventListener('click', async () => {
            initAudio(); 
            initThreeJS(); 
            startScreen.style.display = 'none';
            document.getElementById('toggle-mode-btn').classList.remove('hidden');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                
                // Hardening iOS inline playback: keep camera stream inside the page.
                videoElement.playsInline = true;
                videoElement.autoplay = true;
                videoElement.muted = true;
                videoElement.controls = false;
                videoElement.setAttribute('playsinline', '');
                videoElement.setAttribute('webkit-playsinline', '');

                videoElement.srcObject = stream;
                
                // FIX iOS: Forza esplicitamente la riproduzione del video dopo aver collegato lo stream, 
                // in modo da bypassare l'icona Play al centro dello schermo.
                videoElement.play().catch(e => console.warn("Auto-play iOS fallback:", e));
                
                // Attendiamo che il video sia caricato per avviare il processo,
                // sfruttando l'attributo HTML `autoplay` nativo senza usare .play() esplicitamente.
                videoElement.addEventListener("loadeddata", () => {
                    let lastVideoTime = -1;
                    let isProcessing = false; // <-- SEMAFORO ANTI-FREEZE CRUCIALE PER IPHONE

                    const processFrame = async () => {
                        if (!isProcessing && videoElement.currentTime !== lastVideoTime) {
                            isProcessing = true; // Blocca il thread finché l'AI non ha finito
                            lastVideoTime = videoElement.currentTime;
                            try {
                                await pose.send({image: videoElement});
                                await hands.send({image: videoElement});
                            } catch (e) {
                                console.error("AI Error:", e);
                            } finally {
                                isProcessing = false; // Sblocca per il prossimo frame
                            }
                        }
                        requestAnimationFrame(processFrame);
                    };
                    processFrame();
                });

            } catch (error) {
                console.error("Errore accesso fotocamera:", error);
            }
        });

        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        toggleModeBtn.addEventListener('click', () => {
            isRockMode = !isRockMode;
            
            if (isRockMode) {
                toggleModeBtn.innerText = "⚡"; 
            } else {
                toggleModeBtn.innerText = "🎸"; 
            }
            
            lastChordName = ""; 
            updateChordText(CHORDS[activeChordIndex].name);

            if (fallbackGuitar) fallbackGuitar.visible = !isRockMode;
            if (rockGuitar) rockGuitar.visible = isRockMode;
        });

    </script>
</body>
</html>
